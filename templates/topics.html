{% extends "base.html" %}

{% block content %}
<section class="hero compact">
  <p class="eyebrow">Round 2</p>
  <h1>Table Topics against Humanity</h1>
  <p class="subtitle">One role. One situation. One twist. The speaker must make wisdom out of chaos.</p>
</section>

<main class="topic-stage">
  <section class="cards-row">
    <article class="flip-card" id="roleCard">
      <div class="flip-inner">
        <div class="card-face card-back"><span>ROLE</span></div>
        <div class="card-face card-front">
          <p class="card-label">Role</p>
          <h2 id="roleText">—</h2>
        </div>
      </div>
    </article>

    <article class="flip-card" id="situationCard">
      <div class="flip-inner">
        <div class="card-face card-back"><span>SITUATION</span></div>
        <div class="card-face card-front">
          <p class="card-label">Situation</p>
          <h2 id="situationText">—</h2>
        </div>
      </div>
    </article>

    <article class="flip-card" id="twistCard">
      <div class="flip-inner">
        <div class="card-face card-back"><span>TWIST</span></div>
        <div class="card-face card-front">
          <p class="card-label">Twist</p>
          <h2 id="twistText">—</h2>
        </div>
      </div>
    </article>
  </section>

  <section class="stage-card topic-summary">
    <button class="primary-btn large" id="drawCardsBtn">Reveal the Topic</button>
    <p class="muted" id="topicHint">Cards are currently face down.</p>
    <div class="full-topic" id="fullTopic"></div>
  </section>
</main>

<script src="/static/topics.js"></script>
{% endblock %}
